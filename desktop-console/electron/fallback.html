<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';"
    />
    <title>Security Radio Dispatch Console</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0f14;
        color: #d8e0e8;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      .card {
        width: 460px;
        max-width: calc(100vw - 48px);
        padding: 32px;
        background: #141a22;
        border: 1px solid #232c38;
        border-radius: 8px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 18px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #2fbf4e;
      }
      p {
        margin: 8px 0;
        line-height: 1.45;
        font-size: 14px;
        color: #9aa7b4;
      }
      label {
        display: block;
        margin: 18px 0 6px;
        font-size: 12px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #9aa7b4;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        font-size: 14px;
        color: #eef3f7;
        background: #0b0f14;
        border: 1px solid #2c3848;
        border-radius: 4px;
      }
      input:focus {
        outline: none;
        border-color: #2fbf4e;
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }
      button {
        margin-top: 18px;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        color: #06210d;
        background: #2fbf4e;
        border: 0;
        border-radius: 4px;
        cursor: pointer;
      }
      .row button {
        margin-top: 0;
        flex: 1;
      }
      button.secondary {
        color: #d8e0e8;
        background: #2c3848;
      }
      button:hover {
        filter: brightness(1.08);
      }
      .err {
        color: #ff6b6b;
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Dispatch Console</h1>
      <p id="lead">Loading…</p>

      <div id="setup" hidden>
        <label for="url">Dispatch server address</label>
        <input id="url" type="text" placeholder="https://dispatch.example.com" autocomplete="off" />
        <p>The address of your Security Radio server. It is remembered on this computer.</p>
        <p id="err" class="err" hidden></p>
        <button id="connect">Connect</button>
      </div>

      <div id="error" hidden>
        <p id="error-detail" class="err"></p>
        <div class="row">
          <button id="retry">Retry</button>
          <button id="change" class="secondary">Change server…</button>
        </div>
      </div>
    </main>

    <script>
      const api = window.desktopConsole;
      const leadEl = document.getElementById("lead");
      const setupEl = document.getElementById("setup");
      const errorEl = document.getElementById("error");
      const urlInput = document.getElementById("url");
      const errEl = document.getElementById("err");
      const errorDetail = document.getElementById("error-detail");

      function showSetup(url) {
        errorEl.hidden = true;
        leadEl.textContent = "Connect this console to your dispatch server.";
        urlInput.value = url || "";
        setupEl.hidden = false;
        urlInput.focus();
      }

      async function connect() {
        errEl.hidden = true;
        const result = await api.save(urlInput.value);
        if (!result.ok) {
          errEl.textContent = result.error || "Invalid address.";
          errEl.hidden = false;
        }
      }

      async function init() {
        if (!api) {
          leadEl.textContent = "Desktop bridge unavailable — restart the app.";
          return;
        }
        const state = await api.getState();
        if (state.mode === "error") {
          leadEl.textContent = "Could not reach the dispatch server.";
          errorDetail.textContent =
            (state.error || "Connection failed.") + (state.url ? "  (" + state.url + ")" : "");
          errorEl.hidden = false;
        } else {
          showSetup(state.url);
        }
      }

      document.getElementById("connect").addEventListener("click", connect);
      urlInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") connect();
      });
      document.getElementById("retry").addEventListener("click", () => api.retry());
      document.getElementById("change").addEventListener("click", () => showSetup(""));

      init();
    </script>
  </body>
</html>
