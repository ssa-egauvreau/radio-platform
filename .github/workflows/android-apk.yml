name: Android APK

# Builds a signed release APK and publishes it to the server's OTA endpoint so the
# sideloaded fleet self-updates. Runs whenever the Android app changes on main.
on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & publish APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require signing secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not set. OTA needs a stable release keystore — see docs/android-ota.md." >&2
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android-app/**/build.gradle*', 'android-app/**/gradle-wrapper.properties', 'android-app/**/settings.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Configure local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android-app/local.properties

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          # Strip any whitespace/newlines/CR the secret may have picked up when pasted,
          # otherwise `base64 -d` errors with "invalid input".
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/release.keystore"
          if [ ! -s "$RUNNER_TEMP/release.keystore" ]; then
            echo "::error::Decoded keystore is empty — the RELEASE_KEYSTORE_BASE64 secret looks truncated. Re-paste the full one-line value." >&2
            exit 1
          fi

      - name: Compute version
        run: |
          # 1000 + run_number keeps versionCode monotonic and above the legacy installed code (1).
          echo "APP_VERSION_CODE=$((1000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "APP_VERSION_NAME=0.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build signed release APK
        working-directory: android-app
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: safet-ptt-release-apk
          path: android-app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish to OTA endpoint
        env:
          PUBLISH_URL: ${{ secrets.APP_UPDATE_PUBLISH_URL }}
          PUBLISH_TOKEN: ${{ secrets.APP_UPDATE_PUBLISH_TOKEN }}
        run: |
          APK=android-app/app/build/outputs/apk/release/app-release.apk
          NOTES=$(git log -1 --pretty=%s | tr -cd '[:alnum:] ._-' | cut -c1-200)
          curl -fsS -X POST "${PUBLISH_URL%/}/v1/app/android/publish" \
            -H "Authorization: Bearer $PUBLISH_TOKEN" \
            -H "X-Version-Code: $APP_VERSION_CODE" \
            -H "X-Version-Name: $APP_VERSION_NAME" \
            -H "X-Notes: $NOTES" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$APK"
          echo "Published versionCode=$APP_VERSION_CODE versionName=$APP_VERSION_NAME"
