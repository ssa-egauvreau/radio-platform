name: iOS

on:
  push:
    branches: [main]
    paths:
      - 'ios-app/**'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'ios-app/**'
      - 'android-app/app/src/main/cpp/codec2/**'
      - 'android-app/app/src/main/cpp/codec2_generated/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

permissions:
  contents: read
  # So the failure-excerpt step below can post the relevant xcodebuild log
  # lines as a PR comment when the build fails — GitHub Actions logs are
  # auth-gated and reviewers without sign-in (or automated agents) can't
  # otherwise diagnose iOS PR failures.
  pull-requests: write

jobs:
  test:
    name: Build and test (iOS Simulator)
    # macos-15 ships Xcode 16.x by default, which is required to read the
    # objectVersion=77 project file that XcodeGen 2.41+ emits. macos-14's
    # Xcode 15.4 errors out with "future Xcode project file format (77)".
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios-app
    steps:
      - uses: actions/checkout@v4
        with:
          # The iOS project pulls libcodec2 (and its dvmvocoder neighbor)
          # straight from android-app/app/src/main/cpp/; libcodec2 is a
          # git submodule that must be present for the Xcode build to
          # compile codec2.c and friends.
          submodules: recursive

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Bootstrap and generate Xcode project
        run: ./setup.sh

      - name: Resolve a destination
        id: dest
        run: |
          # Pick whichever iPhone the runner has booted/available.
          DEVICE=$(xcrun simctl list devices available 'iOS' \
            | grep -E 'iPhone 15( Pro)?( \(.*\))?$' \
            | head -1 \
            | sed -E 's/^ +//; s/ \(.*$//')
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl list devices available 'iOS' \
              | grep -E 'iPhone' \
              | head -1 \
              | sed -E 's/^ +//; s/ \(.*$//')
          fi
          echo "Using simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Run xcodebuild test
        run: |
          set -o pipefail
          # Tee the output so the failure-excerpt step can read it without
          # downloading the xcresult bundle. The result bundle is still
          # uploaded as an artifact for deeper inspection.
          xcodebuild test \
            -project SafeTMobile.xcodeproj \
            -scheme SafeTMobile \
            -destination "platform=iOS Simulator,name=${{ steps.dest.outputs.device }}" \
            -resultBundlePath TestResults.xcresult \
            -retry-tests-on-failure \
            -test-iterations 2 \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES 2>&1 | tee xcodebuild.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: ios-app/TestResults.xcresult

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios-app/xcodebuild.log
          if-no-files-found: warn
          retention-days: 7

      - name: Post failure excerpt to PR
        # Mirror the Android workflow's self-diagnosing step. GitHub
        # Actions logs are auth-gated; drop the relevant xcodebuild lines
        # into a PR comment on failure so reviewers can diagnose iOS
        # build issues from the PR feed.
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'ios-app/xcodebuild.log';
            if (!fs.existsSync(path)) {
              return;
            }
            const text = fs.readFileSync(path, 'utf-8');
            const lines = text.split('\n');
            // Most specific / definitely-fatal first. Generic `error:`
            // is last because Xcode's AppIntentsSSUTraining and other
            // build phases log non-fatal lines like
            // "error: Unable to parse extract.actionsdata" that would
            // otherwise anchor the excerpt away from the real failure.
            const patterns = [
              // XCTest assertion failures look like
              //   "RadioScreenUITests.swift:70: error: -[...] XCTAssertTrue failed"
              // — a SINGLE line number (no column), which distinguishes them
              // from compile errors (file:line:col:) and from the non-fatal
              // AppIntentsSSUTraining "error:" noise. Anchor on these first so a
              // failing test surfaces the actual assertion instead of the
              // "** TEST FAILED **" banner that prints hundreds of lines later.
              /\.swift:\d+: error:/,
              /Assertion Failure:/,
              /\*\* (BUILD|TEST) FAILED \*\*/,
              /Testing failed:/,
              /xcodebuild: error:/,
              /Undefined symbols/,
              /^ld: /,
              /^.*\.swift:\d+:\d+: error:/,
              /^.*\.[chm]p?p?:\d+:\d+: error:/,
              /^Error: /,
              /^.*error:\s/i,
            ];
            let anchor = -1;
            for (const re of patterns) {
              const idx = lines.findIndex((l) => re.test(l));
              if (idx >= 0) {
                anchor = idx;
                break;
              }
            }
            if (anchor < 0) {
              anchor = Math.max(0, lines.length - 80);
            }
            const start = Math.max(0, anchor - 10);
            const end = Math.min(lines.length, anchor + 70);
            const excerpt = lines.slice(start, end).join('\n');
            const truncated = excerpt.length > 60000
              ? excerpt.slice(-60000)
              : excerpt;
            const body =
              `### iOS PR check failed\n\n` +
              `Excerpt around the first error in \`xcodebuild.log\` ` +
              `(lines ${start + 1}–${end}):\n\n` +
              "```\n" +
              truncated +
              "\n```";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
