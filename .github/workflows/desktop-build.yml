name: Build Desktop Installer

# Builds the safeT Command Windows installer (.exe) on a Windows runner so it
# can be downloaded from the Actions tab without a local Node.js toolchain.
on:
  workflow_dispatch:
  push:
    paths:
      - 'desktop-console/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    paths:
      - 'desktop-console/**'
      - '.github/workflows/desktop-build.yml'

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-console/package-lock.json

      - name: Install dependencies
        working-directory: desktop-console
        run: npm ci

      - name: Build Windows installer
        working-directory: desktop-console
        run: npm run dist:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: safeT-Command-Windows-Installer
          path: desktop-console/release/*.exe
          if-no-files-found: error
