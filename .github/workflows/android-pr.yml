name: Android PR check

# Pull-request validation for the Android app. Covers the JVM Kotlin
# compile AND the NDK native build — both are needed because:
#
#   - Without the JVM compile, Kotlin/Gradle errors aren't caught until
#     the release workflow runs on push to main (which needs signing
#     secrets and publishes the APK to OTA, so a failure there is loud).
#
#   - Without the NDK build, native code (dvmvocoder + the libcodec2
#     submodule under cpp/codec2) only gets compiled by the release
#     workflow — too late.
#
# Doesn't run lint, tests, or assemble the APK; the release workflow on
# main does that with the keystore.

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/android-pr.yml'
  pull_request:
    paths:
      - 'android-app/**'
      - '.github/workflows/android-pr.yml'

permissions:
  contents: read

concurrency:
  group: android-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Kotlin + native (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # libcodec2 is vendored as a git submodule under
          # android-app/app/src/main/cpp/codec2 — must be present for the
          # NDK build to succeed.
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install platform + build-tools + NDK + CMake
        # NDK + CMake versions match the release workflow (android-apk.yml)
        # so the PR check builds the native code with the same toolchain
        # that actually ships.
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-pr-${{ runner.os }}-${{ hashFiles('android-app/**/build.gradle*', 'android-app/**/gradle-wrapper.properties', 'android-app/**/settings.gradle*') }}
          restore-keys: |
            gradle-pr-${{ runner.os }}-

      - name: Configure local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android-app/local.properties

      - name: Compile Kotlin + native (debug)
        working-directory: android-app
        # `assembleDebug` runs compileDebugKotlin AND triggers the
        # externalNativeBuild step (CMake → NDK → libcodec2 + JNI bridge
        # + securityradiovocoder.so). Tee the output so the artifact
        # upload below carries the full log even on failure — the
        # GitHub Actions log viewer is auth-gated.
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee gradle-output.log

      - name: Upload gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-output
          path: android-app/gradle-output.log
          if-no-files-found: warn
          retention-days: 7
