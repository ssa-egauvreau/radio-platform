name: Android PR check

# Pull-request validation for the Android app. Covers the JVM Kotlin
# compile AND the NDK native build — both are needed because:
#
#   - Without the JVM compile, Kotlin/Gradle errors aren't caught until
#     the release workflow runs on push to main (which needs signing
#     secrets and publishes the APK to OTA, so a failure there is loud).
#
#   - Without the NDK build, native code (dvmvocoder + the libcodec2
#     submodule under cpp/codec2) only gets compiled by the release
#     workflow — too late.
#
# Doesn't run lint, tests, or assemble the APK; the release workflow on
# main does that with the keystore.

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/android-pr.yml'
  pull_request:
    paths:
      - 'android-app/**'
      - '.github/workflows/android-pr.yml'

permissions:
  contents: read
  # Needed so the "Post failure excerpt to PR" step can drop the relevant
  # gradle-output.log lines into a PR comment when the build fails.
  pull-requests: write

concurrency:
  group: android-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Kotlin + native (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # libcodec2 is vendored as a git submodule under
          # android-app/app/src/main/cpp/codec2 — must be present for the
          # NDK build to succeed.
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install platform + build-tools + NDK + CMake
        # NDK + CMake versions match the release workflow (android-apk.yml)
        # so the PR check builds the native code with the same toolchain
        # that actually ships.
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-pr-${{ runner.os }}-${{ hashFiles('android-app/**/build.gradle*', 'android-app/**/gradle-wrapper.properties', 'android-app/**/settings.gradle*') }}
          restore-keys: |
            gradle-pr-${{ runner.os }}-

      - name: Configure local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android-app/local.properties

      - name: Compile Kotlin + native (debug)
        working-directory: android-app
        # `assembleDebug` runs compileDebugKotlin AND triggers the
        # externalNativeBuild step (CMake → NDK → libcodec2 + JNI bridge
        # + securityradiovocoder.so). Tee the output so the artifact
        # upload below carries the full log even on failure — the
        # GitHub Actions log viewer is auth-gated.
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee gradle-output.log

      - name: Upload gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-output
          path: android-app/gradle-output.log
          if-no-files-found: warn
          retention-days: 7

      - name: Post failure excerpt to PR
        # GitHub Actions logs are auth-gated, which makes diagnosis from a
        # session that can't sign in painful. On failure, post the lines
        # around the first error directly into a PR comment so a reviewer
        # (or an automated agent watching PR comments) can see what broke
        # without downloading the artifact.
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'android-app/gradle-output.log';
            if (!fs.existsSync(path)) {
              return;
            }
            const text = fs.readFileSync(path, 'utf-8');
            const lines = text.split('\n');
            // Search patterns ordered from most specific (compile errors)
            // to most generic (Gradle FAILED tags). Picks the FIRST hit so
            // we anchor on the actual failure, not its downstream cascade.
            const patterns = [
              // Kotlin compiler error prefix — emitted as
              // `e: file:///…/Foo.kt:42:5 Unresolved reference: bar`
              // (NB: not "error:") and is the most common Android failure
              // mode this workflow needs to surface. Match this FIRST so
              // we never anchor on the downstream Gradle exception cascade.
              /^e:\s/,
              /^.*error:\s/i,
              /^FAILED:/,
              /^CMake Error/,
              /^fatal error:/,
              /^.*undefined reference/,
              /^Execution failed for task/,
              /^\* What went wrong:/,
              /^BUILD FAILED/,
            ];
            let anchor = -1;
            for (const re of patterns) {
              const idx = lines.findIndex((l) => re.test(l));
              if (idx >= 0) {
                anchor = idx;
                break;
              }
            }
            if (anchor < 0) {
              anchor = Math.max(0, lines.length - 80);
            }
            const start = Math.max(0, anchor - 10);
            const end = Math.min(lines.length, anchor + 70);
            const excerpt = lines.slice(start, end).join('\n');
            const truncated = excerpt.length > 60000
              ? excerpt.slice(-60000)
              : excerpt;
            const body =
              `### Android PR check failed\n\n` +
              `Excerpt around the first error in \`gradle-output.log\` ` +
              `(lines ${start + 1}–${end}):\n\n` +
              "```\n" +
              truncated +
              "\n```";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
