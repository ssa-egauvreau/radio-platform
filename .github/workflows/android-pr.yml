name: Android PR check

# Compile-only validation for pull requests that touch the Android app.
# Catches Kotlin/Gradle errors before merge — the existing android-apk.yml
# workflow only runs on push to main and needs release signing secrets,
# so without this PR check, an Android compile error wouldn't show up
# until after the merge had landed.
#
# No keystore, no NDK build, no APK upload — just the JVM-side compile
# (`compileDebugKotlin`) which catches everything the audio-quality PR
# is likely to break (codec wiring, Gradle deps, Kotlin syntax). A
# follow-up could add the native build + UI tests; this keeps the PR
# fast.

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/android-pr.yml'
  pull_request:
    paths:
      - 'android-app/**'
      - '.github/workflows/android-pr.yml'

permissions:
  contents: read

concurrency:
  group: android-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: compileDebugKotlin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install platform + build-tools
        # Skipping NDK / CMake here — the JVM compile path covers every
        # file the audio-quality PR touches, and pulling NDK doubles the
        # CI runtime. The release workflow on main still does the full
        # native build before publishing.
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-pr-${{ runner.os }}-${{ hashFiles('android-app/**/build.gradle*', 'android-app/**/gradle-wrapper.properties', 'android-app/**/settings.gradle*') }}
          restore-keys: |
            gradle-pr-${{ runner.os }}-

      - name: Configure local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android-app/local.properties

      - name: Compile Kotlin (debug)
        working-directory: android-app
        run: ./gradlew compileDebugKotlin --no-daemon --stacktrace
