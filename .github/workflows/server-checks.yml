name: Server / Web Console checks

# Validates the Node server + bundled web console (and shared schemas) on every PR
# and push to main. Catches typecheck / build / test regressions on the side of the
# codebase the other two workflows ignore (android-apk and desktop-build only watch
# their own subfolders).
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'shared-schemas/**'
      - '.github/workflows/server-checks.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'shared-schemas/**'
      - '.github/workflows/server-checks.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: server-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            server/web-console/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci --no-audit --no-fund

      - name: Server tests
        working-directory: server
        run: npm test

      - name: Install web-console deps
        working-directory: server/web-console
        run: npm ci --no-audit --no-fund --include=dev

      - name: Web console typecheck
        working-directory: server/web-console
        run: npx tsc --noEmit

      - name: Web console build
        working-directory: server/web-console
        run: npm run build
